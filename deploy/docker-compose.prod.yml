# Emlakdefter Production Deployment
# Usage: docker-compose -f docker-compose.prod.yml up -d

name: emlakdefter-prod

services:
  backend:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: emlakdefter_backend
    restart: always
    ports:
      - "8000:8000" # FastAPI
      - "8001:8001" # WebSocket (separate port)
    environment:
      - DATABASE_URL=postgresql+asyncpg://emlakdefter_user:emlakdefter_password@db:5432/emlakdefter
      - SYNC_DATABASE_URL=postgresql+psycopg2://emlakdefter_user:emlakdefter_password@db:5432/emlakdefter
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - ../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:15-alpine
    container_name: emlakdefter_db
    restart: always
    environment:
      POSTGRES_USER: emlakdefter_user
      POSTGRES_PASSWORD: emlakdefter_password
      POSTGRES_DB: emlakdefter
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U emlakdefter_user -d emlakdefter" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emlakdefter_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    container_name: emlakdefter_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
